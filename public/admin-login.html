<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Login — IMPI</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F8FA;
      --surface: #FFFFFF;
      --border: #E2E6EE;
      --text-primary: #0F1623;
      --text-secondary: #4B5563;
      --text-muted: #9CA3AF;
      --accent-red: #D42B2B;
      --fh: 'Montserrat', sans-serif;
      --fb: 'Inter', sans-serif;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --radius-lg: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--fb);
      font-weight: 400;
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-md);
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    #logoImg {
      height: 64px;
      object-fit: contain;
      margin-bottom: 16px;
      display: none;
    }

    #logoText {
      font-family: var(--fh);
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      display: block;
      margin-bottom: 16px;
    }

    .logo-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-of-type {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background-color: var(--surface);
      color: var(--text-primary);
      font-family: var(--fb);
      font-size: 15px;
      font-weight: 400;
      transition: all 0.2s ease;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-muted);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-red);
      box-shadow: 0 0 0 3px rgba(212, 43, 43, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--accent-red);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-family: var(--fh);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .login-btn:hover:not(:disabled) {
      background-color: #B92222;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(212, 43, 43, 0.25);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    #errorMsg {
      display: none;
      padding: 12px 14px;
      background-color: #FEE2E2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      color: #991B1B;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .back-link {
      display: block;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      padding: 8px 0;
    }

    .back-link:hover {
      color: var(--accent-red);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 40px 24px;
      }

      .logo-section {
        margin-bottom: 32px;
      }

      #logoImg {
        height: 56px;
      }

      #logoText {
        font-size: 24px;
      }

      label {
        font-size: 12px;
      }

      input[type="email"],
      input[type="password"] {
        padding: 11px 12px;
        font-size: 16px;
      }

      .login-btn {
        padding: 11px 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <img id="logoImg" src="" alt="IMPI Logo">
        <div id="logoText">IMPI</div>
        <div class="logo-subtitle">Admin Portal</div>
      </div>

      <form onsubmit="login(event)">
        <div class="form-group">
          <label for="emailInput">Email (team members only)</label>
          <input
            type="email"
            id="emailInput"
            placeholder="your@email.com"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="pwInput">Password</label>
          <input
            type="password"
            id="pwInput"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <div id="errorMsg"></div>

        <button type="submit" id="loginBtn" class="login-btn">Sign In</button>
      </form>

      <a href="/" class="back-link">← Back to Portal</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('impi_admin_token')) {
      location.href = '/admin.html';
    }

    // Load design settings for logo
    async function loadDesign() {
      try {
        const res = await fetch('/api/design');
        const d = await res.json();
        if (d.impi_logo_url) {
          document.getElementById('logoImg').src = d.impi_logo_url;
          document.getElementById('logoImg').style.display = 'block';
          document.getElementById('logoText').style.display = 'none';
        }
      } catch {}
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function login(event) {
      event.preventDefault();

      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('pwInput').value;
      if (!password) {
        showError('Please enter your password.');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      hideError();

      try {
        const body = { password };
        if (email) body.email = email;
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          sessionStorage.setItem('impi_admin_token', data.token);
          sessionStorage.setItem('impi_admin_role', data.role || 'staff');
          sessionStorage.setItem('impi_admin_name', data.name || 'Admin');
          location.href = '/admin.html';
        } else {
          showError(data.message || 'Login failed. Please check your credentials.');
        }
      } catch {
        showError('Connection error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Enter key on password field
    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        login(e);
      }
    });

    document.addEventListener('DOMContentLoaded', loadDesign);
  </script>
</body>
</html>
